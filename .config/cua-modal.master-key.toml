command = "workbench.action.files.newUntitledFile"
tags = ["action"]
doc.kind = "action"
doc.name = "new tab"
doc.description = "new untitled file"

[[bind]]
key = "shift+t"
mode = "-- 📌 EDITOR --"
command = "workbench.action.reopenClosedEditor"
tags = ["action"]
doc.kind = "action"
doc.name = "reopen tab"
doc.description = "reopen closed tab"

[[bind]]
key = "w"
mode = "-- 📌 EDITOR --"
command = "workbench.action.closeActiveEditor"
tags = ["action"]
doc.kind = "action"
doc.name = "close tab"
doc.description = "close active editor"

[[bind]]
key = "p"
mode = "-- 📌 EDITOR --"
command = "workbench.action.quickOpen"
tags = ["action"]
doc.kind = "action"
doc.name = "quick open"
doc.description = "quick open file palette"

# =============================================================================
## ## Find & Navigate
# =============================================================================

[[bind]]
key = "f"
mode = "-- 📌 EDITOR --"
command = "actions.find"
tags = ["action"]
doc.kind = "action"
doc.name = "find"
doc.description = "find"

[[bind]]
key = "h"
mode = "-- 📌 EDITOR --"
command = "editor.action.startFindReplaceAction"
tags = ["action"]
doc.kind = "action"
doc.name = "replace"
