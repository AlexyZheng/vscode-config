#:master-keybindings
# author: CUA Modal 
#
# A CUA-style, selection-first modal keybinding set for master-key.
# Two modes: WRITE (type text) and EDITOR (commands). Motions always
# extend the selection (Kakoune-style); there is no separate select mode.
#
# Mode switching:
# - Meta+Tab      : toggle EDITOR ↔ WRITE
# - Meta+Space    : cycle EDITOR → WRITE → EDITOR
# - Space         : collapse selection (drop to single cursor)
# - Enter         : insert a new line after the cursor
#
# Multicursor (visual macros):
# - d / shift+d   : match next / match all (add cursors at occurrences)
# - q / shift+q   : cursor below / above
# - ;             : split lines (cursor at end of each selected line)
# - u             : undo last cursor operation (tap repeatedly)
# - i / shift+i   : grow / shrink selection (semantic)
# - [             : select to bracket
# - r             : replace & write (cut → WRITE mode)
# - j             : join lines
# - ' / shift+[   : wrap selection in quotes / brackets
# - / / shift+/   : lowercase / uppercase
# - .             : repeat last action (not motion)
# - z / shift+z   : undo / redo (text)
#
# Line operations & folding:
# - shift+up/down : move line up / down
# - shift+f       : toggle fold at cursor
#
# WRITE mode entry points (shift = "and type"):
# - shift+enter   : new line below → WRITE
# - ctrl+enter    : new line above → WRITE
# - shift+home    : line start → WRITE
# - shift+end     : line end → WRITE
#
# Count (visual multiplier): press 1-9 then a command. For cursor-spawning
# commands the count is exact from a single selection (3d = 3 cursors).
#
# Navigation (all motions extend the selection):
# - Arrows        : char extend (no mod) / word (Ctrl) / line-doc (Ctrl+Shift)
# - Home/,        : line start
# - End           : line end
# - Ctrl+Home/End : page up/down
#
# Delete:
# - x = cut (selection, or whole line if none)
# - k = delete line (no clipboard)
# - delete    = delete word right
# - backspace = delete word left
#
# All EDITOR bindings are single keys (or modifier+arrow for the
# char/word/line hierarchy). WRITE mode falls through to VS Code defaults.

# ── 1. HEADER ──
[header]
name = "CUA Modal"
version = "2.0.0"

# ── 2. KINDS (must be declared for doc.kind validation) ──
[[kind]]
name = "motion"
description = "Commands that move the cursor and/or extend selections."

[[kind]]
name = "action"
description = "Actions that do something with text (cut, copy, paste, save, etc.)."

[[kind]]
name = "util"
description = "Utility commands: mode switching, panels, file management."

# ── 3. MODES ──
# Two modes only. In EDITOR mode all motions extend the selection; use
# Space to collapse the selection back to a single cursor.
[[mode]]
name = "-- ⌨️  WRITE --"
default = true
whenNoBinding = "insertCharacters"
cursorShape = "LineThin"
highlight = "Alert"

[[mode]]
name = "-- 📌 EDITOR --"
cursorShape = "Block"
highlight = "NoHighlight"

# =============================================================================
## ## Mode Switching
# =============================================================================

# Meta+Tab : EDITOR ↔ WRITE
[[bind]]
key = "meta+tab"
mode = "-- ⌨️  WRITE --"
command = "master-key.setMode"
args.value = "-- 📌 EDITOR --"
doc.kind = "util"
doc.name = "to editor"
doc.description = "exit write mode → editor mode"

[[bind]]
key = "meta+tab"
mode = "-- 📌 EDITOR --"
command = "master-key.setMode"
args.value = "-- ⌨️  WRITE --"
doc.kind = "util"
doc.name = "to write"
doc.description = "enter write mode"

# Meta+Space : cycle EDITOR → WRITE → EDITOR
[[bind]]
key = "meta+space"
mode = "-- 📌 EDITOR --"
command = "master-key.setMode"
args.value = "-- ⌨️  WRITE --"
doc.kind = "util"
doc.name = "→ write"
doc.description = "cycle to write mode"

[[bind]]
key = "meta+space"
mode = "-- ⌨️  WRITE --"
command = "master-key.setMode"
args.value = "-- 📌 EDITOR --"
doc.kind = "util"
doc.name = "→ editor"
doc.description = "cycle to editor mode"

# Space : collapse selection (drop to single cursor)
#   Needed because motions always extend; this clears the selection.
[[bind]]
key = "space"
mode = "-- 📌 EDITOR --"
command = "cancelSelection"
doc.kind = "util"
doc.name = "collapse"
doc.description = "collapse selection to a single cursor"

# Escape : universal escape → EDITOR mode
[[bind]]
key = "escape"
mode = "-- ⌨️  WRITE --"
when = "master-key.mode == '-- ⌨️  WRITE --'"
command = "master-key.setMode"
args.value = "-- 📌 EDITOR --"
doc.kind = "util"
doc.name = "to editor"
doc.description = "exit write mode → editor mode"
# Accessible View binding for WRITE mode
[[bind]]
key = "ctrl+alt+`"
mode = "-- ⌨️  WRITE --"
command = "editor.action.accessibleView"
doc.kind = "util"
doc.name = "accessible view"
doc.description = "open accessible view from write mode"

# Accessible View binding for EDITOR mode
[[bind]]
key = "ctrl+alt+`"
mode = "-- 📌 EDITOR --"
command = "editor.action.accessibleView"
doc.kind = "util"
doc.name = "accessible view"
doc.description = "open accessible view from editor mode"

# Universal escape hatch back to EDITOR mode
[[bind]]
key = "ctrl+alt+escape"
mode = "-- ⌨️  WRITE --"
command = "master-key.setMode"
args.value = "-- 📌 EDITOR --"
doc.kind = "util"
doc.name = "to editor"
doc.description = "linux compatible terminal breakout"

# 3. Escape: Focus document and close all surrounding panels
[[bind]]
key = "escape"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "workbench.action.focusActiveEditorGroup",
    "workbench.action.closePanel",
    "workbench.action.closeSidebar"
]
doc.kind = "util"
doc.name = "focus and clear layout"
doc.description = "focus active file + close bottom panel + close sidebar panels"





[[bind]]
key = "ctrl+c"
mode = "-- ⌨️  WRITE --"
command = "master-key.setMode"
args.value = "-- 📌 EDITOR --"
doc.kind = "util"
doc.name = "to editor via cancel control"

# Enter : "wrappedLineFirstNonWhitespaceCharacter" 
[[bind]]
key = "enter"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    { command = "cursorMove", args = { to = "nextBlankLine" } },
    { command = "cursorMove", args = { to = "down", by = "line", value = 1 } },
    { command = "cursorMove", args = { to = "wrappedLineFirstNonWhitespaceCharacter" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "new line"
doc.description = "insert a new line after the cursor"

# ── 4. TERMINAL PANEL BINDINGS ──

# ` (Backtick) : Open VS Code bottom terminal and change focus to it
[[bind]]
key = "`"
mode = "-- 📌 EDITOR --"
command = "workbench.action.terminal.toggleTerminal"
doc.kind = "util"
doc.name = "open terminal"
doc.description = "open bottom panel terminal and focus it"

[[bind]]
key = "tab"
mode = "-- 📌 EDITOR --"
command = "master-key.setMode"
args.value = "-- ⌨️  WRITE --"
doc.kind = "util"
doc.name = "to write"
doc.description = "quickly enter write mode from editor mode"
# =============================================================================
## ## Clipboard (CUA)
# =============================================================================

# x = Cut (CUA Ctrl+X)
#   With selection: cut selection.
#   Without selection: cut entire line (expandLineSelection + cut).
[[bind]]
key = "x"
mode = "-- 📌 EDITOR --"
command = "editor.action.clipboardCutAction"
when = "editorHasSelection"
tags = ["action"]
doc.kind = "action"
doc.name = "cut"
doc.description = "cut selection"

[[bind]]
key = "x"
mode = "-- 📌 EDITOR --"
command = "runCommands"
when = "!editorHasSelection"
args.commands = [
    "expandLineSelection",
    "editor.action.clipboardCutAction",
]
tags = ["action"]
doc.kind = "action"
doc.name = "cut line"
doc.description = "cut the entire line (no selection)"

# k = Delete line (NO clipboard)
[[bind]]
key = "k"
mode = "-- 📌 EDITOR --"
command = "editor.action.deleteLines"
tags = ["action"]
doc.kind = "action"
doc.name = "delete line"
doc.description = "delete the current line (no clipboard)"

# delete = Delete word right (CUA Ctrl+Delete, drop Ctrl)
[[bind]]
key = "delete"
mode = "-- 📌 EDITOR --"
command = "deleteWordRight"
tags = ["action"]
doc.kind = "action"
doc.name = "del word →"
doc.description = "delete word to the right"

# backspace = Delete word left (CUA Ctrl+Backspace, drop Ctrl)
[[bind]]
key = "backspace"
mode = "-- 📌 EDITOR --"
command = "deleteWordLeft"
tags = ["action"]
doc.kind = "action"
doc.name = "del word ←"
doc.description = "delete word to the left"

# c = Copy
[[bind]]
key = "c"
mode = "-- 📌 EDITOR --"
command = "editor.action.clipboardCopyAction"
tags = ["action"]
doc.kind = "action"
doc.name = "copy"
doc.description = "copy selection"

# v = Paste
[[bind]]
key = "v"
mode = "-- 📌 EDITOR --"
command = "editor.action.clipboardPasteAction"
tags = ["action"]
doc.kind = "action"
doc.name = "paste"
doc.description = "paste clipboard"

# =============================================================================
## ## History (text undo/redo + repeat last action)
# =============================================================================

# z = Undo (text)
[[bind]]
key = "z"
mode = "-- 📌 EDITOR --"
command = "undo"
tags = ["action", "history"]
doc.kind = "action"
doc.name = "undo"
doc.description = "undo"

# y = Redo (text)
[[bind]]
key = "y"
mode = "-- 📌 EDITOR --"
command = "redo"
tags = ["action", "history"]
doc.kind = "action"
doc.name = "redo"
doc.description = "redo"

# printscreen = Repeat last action (not motion, not history commands)
#   CUA mnemonic: "ditto". Repeats the most recent action-tagged binding.
[[bind]]
key = "shift+z"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{key.count}}"
tags = ["action", "history"]
doc.kind = "action"
doc.name = "repeat action"
doc.description = "repeat the last action (not a motion)"

[[bind.args.commands]]
command = "master-key.replayFromHistory"
args.index = """{{
last_history_index(|i|
    history[i]?.tags.contains("action") &&
    !(history[i]?.tags.contains("history") && history[i]?.doc.name != "replay")
)}}"""

# =============================================================================
## ## File / Tabs
# =============================================================================

[[bind]]
key = "s"
mode = "-- 📌 EDITOR --"
command = "workbench.action.files.save"
tags = ["action"]
doc.kind = "action"
doc.name = "save"
