# =============================================================================
## ## Format (language-specific)
# =============================================================================
# `=` formats the document; scoped per language via `when = "editorLangId"`.
# `shift+=` jumps to the matching bracket (useful in structured formats).

# ── YAML ──
[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'yaml'"
command = "editor.action.formatDocument"
tags = ["action"]
doc.kind = "action"
doc.name = "format (yaml)"
doc.description = "format the YAML document"

# ── JSON ──
[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'json'"
command = "editor.action.formatDocument"
tags = ["action"]
doc.kind = "action"
doc.name = "format (json)"
doc.description = "format the JSON document"

[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'jsonc'"
command = "editor.action.formatDocument"
tags = ["action"]
doc.kind = "action"
doc.name = "format (jsonc)"
doc.description = "format the JSONC document"

# ── XML ──
# NOTE: requires the `redhat.vscode-xml` extension to be installed.
[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'xml'"
command = "editor.action.formatDocument"
tags = ["action"]
doc.kind = "action"
doc.name = "format (xml)"
doc.description = "format the XML document (requires redhat.vscode-xml)"

# ── Nushell (NUON data files) ──
# Format via a task that runs `nu` with `to nuon` (no built-in `nu fmt`).
[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'nushell' && resourceExtname == '.nuon'"
command = "workbench.action.tasks.runTask"
args.task = "nuon-format"
tags = ["action"]
doc.kind = "action"
doc.name = "format (nuon)"
doc.description = "format the NUON data file via nushell"

# ── Nushell (.nu scripts) ──
# Format via nufmt (AST-aware, first-party nushell formatter).
[[bind]]
key = "="
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'nushell' && resourceExtname == '.nu'"
command = "workbench.action.tasks.runTask"
args.task = "nu-format"
tags = ["action"]
doc.kind = "action"
doc.name = "format (nu)"
doc.description = "format the nushell script via nufmt"

# shift+e = evaluate the nushell script (output to terminal)
[[bind]]
key = "shift+e"
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'nushell'"
command = "workbench.action.tasks.runTask"
args.task = "nuon-eval"
tags = ["action"]
doc.kind = "action"
doc.name = "eval (nuon)"
doc.description = "evaluate the nushell script and show output"

# shift+p = parse the NUON file and print it as JSON (validates structure)
[[bind]]
key = "shift+p"
mode = "-- 📌 EDITOR --"
when = "editorLangId == 'nushell'"
command = "workbench.action.tasks.runTask"
args.task = "nuon-parse"
tags = ["action"]
doc.kind = "action"
doc.name = "parse → json (nuon)"
doc.description = "parse the NUON file and print it as JSON"

# ── Jump to bracket (language-agnostic, useful in structured formats) ──
[[bind]]
key = "shift+="
mode = "-- 📌 EDITOR --"
command = "editor.action.jumpToBracket"
tags = ["motion"]
doc.kind = "motion"
doc.name = "jump bracket"
doc.description = "jump to the matching bracket"
