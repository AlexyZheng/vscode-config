# =============================================================================
## ## Panels
# =============================================================================

[[bind]]
key = "b"
mode = "-- 📌 EDITOR --"
command = "workbench.action.toggleSidebarVisibility"
tags = ["action"]
doc.kind = "action"
doc.name = "sidebar"
doc.description = "toggle sidebar"

[[bind]]
key = "e"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "workbench.view.explorer",
    "workbench.action.focusActiveEditorGroup",
]
tags = ["action"]
