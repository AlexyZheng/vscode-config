# =============================================================================
## ## Count (visual multiplier)
# =============================================================================
# Press digits 1-9 (and 0) to build a count shown in the status bar, then
# press a count-aware command to apply it. For cursor-spawning commands the
# count is exact from a single selection (3d = 3 cursors total).
# `finalKey = false` so digits accumulate (12 = twelve) without firing.
# Active only in EDITOR — in WRITE mode digits type normally.

[[bind]]
foreach.num = ['{{keys(`[0-9]`)}}']
key = "{{num}}"
mode = "-- 📌 EDITOR --"
command = "master-key.updateCount"
args.value = "{{num}}"
finalKey = false
doc.kind = "util"
doc.name = "count {{num}}"
doc.description = "add digit {{num}} to the count (visual multiplier)"
doc.combined.key = "0-9"
doc.combined.name = "count 0-9"
doc.combined.description = "build a count shown in the status bar"

[[bind]]
foreach.num = ['{{keys(`[0-9]`)}}']
key = "numpad{{num}}"
mode = "-- 📌 EDITOR --"
command = "master-key.updateCount"
args.value = "{{num}}"
finalKey = false
doc.kind = "util"
doc.name = "count {{num}} (numpad)"
doc.description = "add digit {{num}} to the count (numpad)"
doc.hideInPalette = true
doc.hideInDocs = true

# =============================================================================
## ## Multicursor (visual macros)
# =============================================================================
# Kakoune-style: motions always extend, so selections are the primary editing
# unit. Spawn cursors from the current selection, then any edit applies to all
# cursors at once. Count is exact from a single selection (3d = 3 cursors).

# d = match next (add cursor at next occurrence of selection)
#   CUA mnemonic: "duplicate" cursor at next match. Count is exact: from one
#   selection, 3d yields 3 cursors (repeats add-selection N-1 times).
[[bind]]
key = "d"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{max(key.count - 1, 0)}}"
args.commands = ["editor.action.addSelectionToNextFindMatch"]
tags = ["action"]
doc.kind = "action"
doc.name = "match next"
doc.description = "add a cursor at the next match of the selection"

# shift+d = match all (cursor on every occurrence)
[[bind]]
key = "shift+d"
mode = "-- 📌 EDITOR --"
command = "editor.action.selectHighlights"
tags = ["action"]
doc.kind = "action"
doc.name = "match all"
doc.description = "add a cursor on every occurrence of the selection"

# q = cursor below (add a cursor on the next line)
#   CUA mnemonic: "queue" a cursor below. Count is exact from one cursor.
[[bind]]
key = "q"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{max(key.count - 1, 0)}}"
args.commands = ["editor.action.insertCursorBelow"]
tags = ["action"]
doc.kind = "action"
doc.name = "cursor ↓"
doc.description = "add a cursor on the next line below"

# shift+q = cursor above
[[bind]]
key = "shift+q"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{max(key.count - 1, 0)}}"
args.commands = ["editor.action.insertCursorAbove"]
tags = ["action"]
doc.kind = "action"
doc.name = "cursor ↑"
doc.description = "add a cursor on the previous line above"

# ; = split lines (cursor at end of each selected line)
[[bind]]
key = ";"
mode = "-- 📌 EDITOR --"
command = "editor.action.insertCursorAtEndOfEachLineSelected"
tags = ["action"]
doc.kind = "action"
doc.name = "split lines"
doc.description = "add a cursor at the end of each selected line"

# u = undo cursor (remove last cursor operation; tap repeatedly)
#   Distinct from z (text undo): u undoes cursor state only.
[[bind]]
key = "u"
mode = "-- 📌 EDITOR --"
command = "cursorUndo"
tags = ["action"]
doc.kind = "action"
doc.name = "undo cursor"
doc.description = "remove the last cursor operation (tap repeatedly)"

# i = grow selection (semantic: word → string → block → document)
#   CUA mnemonic: "increase" the selection. Count repeats the growth.
[[bind]]
key = "i"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{key.count}}"
args.commands = ["editor.action.smartSelect.expand"]
tags = ["motion"]
doc.kind = "motion"
doc.name = "grow"
doc.description = "grow the selection to the next semantic unit"

# shift+i = shrink selection
[[bind]]
key = "shift+i"
mode = "-- 📌 EDITOR --"
command = "runCommands"
repeat = "{{key.count}}"
args.commands = ["editor.action.smartSelect.shrink"]
tags = ["motion"]
doc.kind = "motion"
doc.name = "shrink"
doc.description = "shrink the selection to the previous semantic unit"

# [ = select to bracket (select inside the matching bracket pair)
[[bind]]
key = "["
mode = "-- 📌 EDITOR --"
command = "editor.action.selectToBracket"
tags = ["motion"]
doc.kind = "motion"
doc.name = "to bracket"
doc.description = "select inside the matching bracket pair"

# r = replace & write (cut selection, then enter WRITE to type replacement)
#   CUA mnemonic: "replace". Flows into WRITE for ergonomic typing.
[[bind]]
key = "r"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "editor.action.clipboardCutAction",
    { command = "master-key.setMode", args = { value = "-- ⌨️  WRITE --" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "replace → write"
doc.description = "cut selection and enter write mode to type the replacement"

# j = join lines
#   CUA mnemonic: "join".
[[bind]]
key = "j"
mode = "-- 📌 EDITOR --"
command = "editor.action.joinLines"
tags = ["action"]
doc.kind = "action"
doc.name = "join"
doc.description = "join the selected lines into one"

# ' = wrap selection in double quotes
[[bind]]
key = "'"
mode = "-- 📌 EDITOR --"
command = "editor.action.insertSnippet"
args.snippet = "\"${TM_SELECTED_TEXT}\""
tags = ["action"]
doc.kind = "action"
doc.name = "wrap \""
doc.description = "wrap the selection in double quotes"

# shift+[ = wrap selection in square brackets
[[bind]]
key = "shift+["
mode = "-- 📌 EDITOR --"
command = "editor.action.insertSnippet"
args.snippet = "[${TM_SELECTED_TEXT}]"
tags = ["action"]
doc.kind = "action"
doc.name = "wrap [ ]"
doc.description = "wrap the selection in square brackets"

# / = transform to lowercase (points down → lowercase)
[[bind]]
key = "/"
mode = "-- 📌 EDITOR --"
command = "editor.action.transformToLowercase"
tags = ["action"]
doc.kind = "action"
doc.name = "lowercase"
doc.description = "transform the selection to lowercase"

# shift+/ = transform to uppercase
[[bind]]
key = "shift+/"
mode = "-- 📌 EDITOR --"
command = "editor.action.transformToUppercase"
tags = ["action"]
doc.kind = "action"
doc.name = "uppercase"
doc.description = "transform the selection to uppercase"

# =============================================================================
## ## Line operations & folding
# =============================================================================
# Shift+arrow = act on the line (vs plain arrow = select). CUA hierarchy:
#   plain arrow  = extend selection
#   shift+arrow  = move the line / fold

# shift+up = move line (or selection) up
[[bind]]
key = "shift+up"
mode = "-- 📌 EDITOR --"
command = "editor.action.moveLinesUpAction"
tags = ["action"]
doc.kind = "action"
doc.name = "move line ↑"
doc.description = "move the current line/selection up"

# shift+down = move line (or selection) down
[[bind]]
key = "shift+down"
mode = "-- 📌 EDITOR --"
command = "editor.action.moveLinesDownAction"
tags = ["action"]
doc.kind = "action"
doc.name = "move line ↓"
doc.description = "move the current line/selection down"

# shift+f = toggle fold at cursor (fold ↔ unfold)
[[bind]]
key = "shift+f"
mode = "-- 📌 EDITOR --"
command = "editor.toggleFold"
tags = ["action"]
doc.kind = "action"
doc.name = "toggle fold"
doc.description = "fold or unfold the block at the cursor"

# =============================================================================
## ## WRITE mode entry points
# =============================================================================
# Shift = "and type". Each enters WRITE mode at a useful location, so you can
# start typing immediately without a separate mode switch.

[[bind]]
key = "shift+enter"
mode = "-- 📌 EDITOR --"
command = "editor.action.insertLineBefore"
tags = ["action"]
doc.kind = "action"
doc.name = "open line above"
doc.description = "open a new line above and stay in editor mode"


# shift+enter = new line below → WRITE
[[bind]]
key = "ctrl+shift+enter"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "editor.action.insertLineAfter",
    { command = "master-key.setMode", args = { value = "-- ⌨️  WRITE --" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "open below → write"
doc.description = "open a new line below and enter write mode"

# ctrl+shift+enter = new line above → WRITE
[[bind]]
key = "shift+ctrl+enter"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "editor.action.insertLineBefore",
    { command = "master-key.setMode", args = { value = "-- ⌨️  WRITE --" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "open above → write"
doc.description = "open a new line above and enter write mode"

# shift+home = go to line start → WRITE
[[bind]]
key = "shift+home"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "cursorLineStart",
    { command = "master-key.setMode", args = { value = "-- ⌨️  WRITE --" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "line start → write"
doc.description = "move to start of line and enter write mode"

# shift+end = go to line end → WRITE
[[bind]]
key = "shift+end"
mode = "-- 📌 EDITOR --"
command = "runCommands"
args.commands = [
    "cursorLineEnd",
    { command = "master-key.setMode", args = { value = "-- ⌨️  WRITE --" } },
]
tags = ["action"]
doc.kind = "action"
doc.name = "line end → write"
doc.description = "move to end of line and enter write mode"

# =============================================================================
## ## Navigation (all motions extend the selection)
# =============================================================================
# Arrow hierarchy (consistent modifier levels):
#   (none)      = char extend
#   Ctrl        = word extend
#   Ctrl+Shift  = line/doc level extend
# All variants use *Select commands so the selection grows as you move.

# ── Arrows: char extend ──
[[bind]]
key = "left"
mode = "-- 📌 EDITOR --"
command = "cursorLeftSelect"
tags = ["motion"]
doc.kind = "motion"
